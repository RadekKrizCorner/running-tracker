apiVersion: batch/v1
kind: Job
metadata:
  name: running-tracker-migrate
  labels:
    app.kubernetes.io/name: running-tracker-migrate
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: running-tracker
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: running-tracker-migrate
        app.kubernetes.io/component: migration
        app.kubernetes.io/part-of: running-tracker
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: running-tracker-secret
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: running-tracker-secret
                  key: POSTGRES_DB
          command:
            - sh
            - -c
            - until pg_isready -h postgres -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done
      containers:
        - name: migrate
          image: running-tracker-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - alembic
            - upgrade
            - head
          envFrom:
            - configMapRef:
                name: running-tracker-config
            - secretRef:
                name: running-tracker-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
