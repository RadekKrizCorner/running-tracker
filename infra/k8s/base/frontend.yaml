apiVersion: v1
kind: Service
metadata:
  name: running-tracker-frontend
  labels:
    app.kubernetes.io/name: running-tracker-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: running-tracker
spec:
  ports:
    - name: http
      port: 8080
      targetPort: http
  selector:
    app.kubernetes.io/name: running-tracker-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: running-tracker-frontend
  labels:
    app.kubernetes.io/name: running-tracker-frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: running-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: running-tracker-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: running-tracker-frontend
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: running-tracker
    spec:
      containers:
        - name: frontend
          image: running-tracker-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
