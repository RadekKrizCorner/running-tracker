services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: running
      POSTGRES_PASSWORD: running
      POSTGRES_DB: running_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U running -d running_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine

  api:
    build:
      context: ./backend
    env_file:
      - .env
    ports:
      - "${API_PORT:-8009}:8009"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8009 --reload"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: python -m app.jobs.worker
    volumes:
      - ./backend/app:/app/app

  scheduler:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      worker:
        condition: service_started
    command: python -m app.jobs.scheduler
    volumes:
      - ./backend/app:/app/app

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
